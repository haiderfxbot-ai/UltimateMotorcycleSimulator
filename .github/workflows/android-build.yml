name: Build Android APK

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build git

      - name: Configure CMake for Android
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          mkdir -p build/android
          cd build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja \
            -DFETCHCONTENT_QUIET=OFF

      - name: Build native library (libmain.so)
        run: |
          cd build/android
          ninja -j$(nproc) 2>&1

      - name: Copy native libraries to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          # Find and copy libSDL2.so
          SDL2_LIB=$(find build/android/_deps -name "libSDL2.so" -type f 2>/dev/null | head -1)
          if [ -n "$SDL2_LIB" ]; then
            cp "$SDL2_LIB" app/src/main/jniLibs/arm64-v8a/libSDL2.so
            echo "Copied libSDL2.so ($(stat -c%s app/src/main/jniLibs/arm64-v8a/libSDL2.so) bytes) from $SDL2_LIB"
          else
            echo "ERROR: libSDL2.so not found!"
            find build/android -name "*.so" -type f 2>/dev/null
            exit 1
          fi
          # Copy libmain.so
          cp build/android/libmain.so app/src/main/jniLibs/arm64-v8a/libmain.so
          echo "Copied libmain.so ($(stat -c%s app/src/main/jniLibs/arm64-v8a/libmain.so) bytes)"
          ls -la app/src/main/jniLibs/arm64-v8a/

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK"
          # Find sdkmanager
          SDKMANAGER=$(find $ANDROID_SDK -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -n "$SDKMANAGER" ]; then
            echo "Using sdkmanager: $SDKMANAGER"
            yes | $SDKMANAGER --licenses 2>/dev/null || true
          else
            echo "sdkmanager not found, checking default paths..."
            ls -la $ANDROID_SDK/ || true
            ls -la $ANDROID_SDK/cmdline-tools/ 2>/dev/null || true
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build debug APK with Gradle
        run: |
          which gradle 2>/dev/null || echo "Gradle not in PATH"
          # The runner has Gradle installed at /opt/gradle or via SDK
          if command -v gradle &>/dev/null; then
            gradle assembleDebug --no-daemon -p .
          elif [ -x /opt/gradle/bin/gradle ]; then
            /opt/gradle/bin/gradle assembleDebug --no-daemon -p .
          else
            # Download Gradle
            wget -q "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
            /opt/gradle-8.5/bin/gradle assembleDebug --no-daemon -p .
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Validate APK contents
        run: |
          APK=$(ls app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          echo "=== APK Contents (libraries) ==="
          unzip -l "$APK" | grep -E "\.so$" || true
          # Verify both required libraries exist
          HAS_SDL2=$(unzip -l "$APK" 2>/dev/null | grep "libSDL2.so" | wc -l)
          HAS_MAIN=$(unzip -l "$APK" 2>/dev/null | grep "libmain.so" | wc -l)
          FAILED=0
          if [ "$HAS_SDL2" -eq 0 ]; then
            echo "ERROR: libSDL2.so not found in APK!"
            FAILED=1
          else
            echo "PASS: libSDL2.so found in APK ($HAS_SDL2 copy/copies)"
          fi
          if [ "$HAS_MAIN" -eq 0 ]; then
            echo "ERROR: libmain.so not found in APK!"
            FAILED=1
          else
            echo "PASS: libmain.so found in APK ($HAS_MAIN copy/copies)"
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo "APK validation failed!"
            exit 1
          fi
          echo "=== APK validation PASSED ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
