name: Build Android APK

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build git

      - name: Configure CMake for Android
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          mkdir -p build/android
          cd build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja \
            -DFETCHCONTENT_QUIET=OFF

      - name: Build
        run: |
          cd build/android
          ninja -j$(nproc) 2>&1

      - name: Prepare APK structure
        if: success()
        run: |
          echo "=== Build output ==="
          find build/android -name "*.so" -o -name "libmain*" 2>/dev/null
          ls -la build/android/ 2>/dev/null
          mkdir -p apk/lib/arm64-v8a
          # SDL2 Android expects libmain.so in apk/lib/arm64-v8a/
          for src in \
            build/android/libmain.so \
            build/android/libUltimateMotorcycle.so \
            build/android/libUltimateMotorcycle.so \
            build/android/UltimateMotorcycle; do
            if [ -f "$src" ]; then
              cp "$src" apk/lib/arm64-v8a/libmain.so
              echo "Copied: $src -> libmain.so"
              break
            fi
          done
          if [ ! -f apk/lib/arm64-v8a/libmain.so ]; then
            echo "WARNING: No libmain.so found!"
            find build/android -type f 2>/dev/null
          fi
          echo "=== APK structure ==="
          find apk -type f

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: apk/
